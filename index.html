<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resfebe Challenge · Yahya Turan Fen Lisesi</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════
   YTFL RESFEBE — Kurumsal Tema
   Palet: #FFD700 Altın  ·  #0D1B3E Lacivert
          #CC2200 Kırmızı ·  #1B8A3C Yeşil  ·  #1565C0 Mavi
   ═══════════════════════════════════════════════════════════════ */
:root{
  --navy:     #0D1B3E;
  --navy2:    #142349;
  --navy3:    #1a2d5a;
  --gold:     #FFD700;
  --gold2:    #FFC107;
  --gold-dim: #c8a800;
  --red:      #CC2200;
  --red-lt:   #ff4422;
  --blue:     #1565C0;
  --blue-lt:  #2196F3;
  --green:    #1B8A3C;
  --green-lt: #2ecc71;
  --white:    #F5F0E8;
  --muted:    #8896b8;
  --card-bg:  #162040;
  --border:   rgba(255,215,0,.18);
  --r:14px; --rl:22px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}

body{
  font-family:'Nunito',sans-serif;
  background:var(--navy);
  color:var(--white);
  min-height:100vh;
  overflow-x:hidden;
  position:relative;
}

/* ── Arka plan parıltı ── */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 70% 45% at 50% 50%,rgba(21,101,192,.07) 0%,transparent 70%),
    radial-gradient(ellipse at 8% 12%,rgba(255,215,0,.07) 0%,transparent 50%),
    radial-gradient(ellipse at 92% 88%,rgba(204,34,0,.06) 0%,transparent 50%);
}

/* ── Atom filigran ── */
#atom-bg{
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:min(680px,95vw);height:min(680px,95vw);
  opacity:.038;pointer-events:none;z-index:0;
}

/* ════════════════════════ HEADER ════════════════════════ */
header{
  position:relative;z-index:10;
  background:linear-gradient(135deg,#091424 0%,var(--navy2) 55%,#0e1d3e 100%);
  border-bottom:3px solid var(--gold);
  box-shadow:0 3px 0 rgba(204,34,0,.35),0 8px 36px rgba(0,0,0,.55);
  overflow:hidden;
}
header::before{/* diyagonal şerit */
  content:'';position:absolute;inset:0;pointer-events:none;
  background:repeating-linear-gradient(-52deg,transparent,transparent 18px,
    rgba(255,215,0,.025) 18px,rgba(255,215,0,.025) 19px);
}
header::after{/* 4-renk alt çizgi */
  content:'';position:absolute;bottom:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--red),var(--gold),var(--blue),var(--green),var(--gold),var(--red));
}
.hdr{max-width:900px;margin:0 auto;padding:.85rem 1.2rem;display:flex;align-items:center;gap:1rem;position:relative}

/* logo halkası */
.logo-ring{
  flex-shrink:0;width:76px;height:76px;border-radius:50%;padding:3px;
  background:conic-gradient(var(--gold) 0 90deg,var(--red) 90deg 180deg,var(--blue) 180deg 270deg,var(--green) 270deg 360deg);
  box-shadow:0 0 0 2px rgba(255,215,0,.22),0 0 26px rgba(255,215,0,.28);
  animation:ringHue 10s linear infinite;transition:box-shadow .3s;
}
.logo-ring:hover{box-shadow:0 0 0 3px var(--gold),0 0 44px rgba(255,215,0,.5)}
@keyframes ringHue{from{filter:hue-rotate(0)}to{filter:hue-rotate(360deg)}}
.logo-inner{width:100%;height:100%;border-radius:50%;overflow:hidden;background:#fff;border:2px solid #fff}
.logo-inner img{width:100%;height:100%;object-fit:cover;display:block}

.hdr-text{flex:1;min-width:0}
.school-tag{
  display:inline-flex;align-items:center;gap:.4rem;
  background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.28);
  border-radius:6px;padding:.12rem .5rem;margin-bottom:.28rem;
}
.school-tag span{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:clamp(.6rem,1.5vw,.73rem);color:var(--gold);letter-spacing:1.1px;text-transform:uppercase;white-space:nowrap}
.school-tag .dot{width:5px;height:5px;border-radius:50%;background:var(--red);flex-shrink:0}
.game-title{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:clamp(1.4rem,4.8vw,2.3rem);color:var(--gold);letter-spacing:.8px;line-height:1;text-shadow:0 0 28px rgba(255,215,0,.38),0 2px 0 rgba(0,0,0,.4);white-space:nowrap}
.game-sub{font-size:clamp(.58rem,1.4vw,.72rem);color:rgba(255,215,0,.52);font-weight:700;letter-spacing:1.4px;text-transform:uppercase;margin-top:.14rem}
.hdr-atom{flex-shrink:0;opacity:.18;animation:spinA 9s linear infinite}
@keyframes spinA{to{transform:rotate(360deg)}}

/* ════════════════════════ HUD BAR ════════════════════════ */
.hud{
  position:sticky;top:0;z-index:20;
  background:#091525;
  border-bottom:1px solid rgba(255,215,0,.1);
  padding:.42rem 1rem;
}
.hud-inner{max-width:900px;margin:0 auto;display:flex;align-items:center;gap:.65rem;flex-wrap:wrap}

/* ilerleme */
.prog-wrap{flex:1;min-width:80px;background:rgba(255,255,255,.07);border-radius:99px;height:9px;overflow:hidden;border:1px solid rgba(255,215,0,.09)}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--gold));border-radius:99px;transition:width .5s cubic-bezier(.4,0,.2,1);box-shadow:0 0 7px rgba(255,215,0,.35)}
.score-lbl{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.86rem;color:var(--gold);letter-spacing:.4px;white-space:nowrap}

/* Süre sayacı */
.timer{
  display:flex;align-items:center;gap:.38rem;
  background:rgba(255,215,0,.07);border:1px solid rgba(255,215,0,.22);
  border-radius:99px;padding:.22rem .75rem;
  font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1rem;
  white-space:nowrap;transition:background .3s,border-color .3s;
}
.timer .tval{color:var(--gold);letter-spacing:.4px}
.timer.critical{background:rgba(204,34,0,.16);border-color:var(--red-lt);animation:timerBlink .55s infinite}
.timer.critical .tval{color:var(--red-lt)}
@keyframes timerBlink{0%,100%{opacity:1}50%{opacity:.35}}

/* Hedef puan */
.target-hud{
  display:flex;align-items:center;gap:.3rem;
  background:rgba(21,101,192,.1);border:1px solid rgba(33,150,243,.25);
  border-radius:99px;padding:.22rem .75rem;
  font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.86rem;
  white-space:nowrap;color:var(--blue-lt);
}
.target-hud .pts{color:var(--gold);font-size:.95rem}

/* ════════════════════════ LAYOUT ════════════════════════ */
#game{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:0 .8rem}

/* ════════════════════════ KELIME BANKASI ════════════════════════ */
.bank-wrap{
  margin:1.1rem 0 .9rem;
  background:linear-gradient(135deg,var(--card-bg),#0d1933);
  border-radius:var(--rl);border:1.5px solid var(--border);
  padding:.9rem 1rem;box-shadow:0 4px 22px rgba(0,0,0,.3);
  position:relative;overflow:hidden;
}
.bank-wrap::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--red),var(--gold),var(--blue),var(--green))}
.bank-label{font-family:'Rajdhani',sans-serif;font-size:.75rem;color:var(--gold-dim);font-weight:700;letter-spacing:1.4px;text-transform:uppercase;margin-bottom:.65rem;display:flex;align-items:center;gap:.38rem}
.bank-label::before{content:'';display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--gold);box-shadow:0 0 5px var(--gold)}
.answer-bank{display:flex;flex-wrap:wrap;gap:.42rem;justify-content:center}
.answer-chip{
  background:var(--navy3);border:1.5px solid rgba(255,215,0,.18);
  border-radius:50px;padding:.35rem 1rem;
  font-size:.88rem;font-weight:700;cursor:grab;user-select:none;color:var(--white);
  transition:transform .15s,background .15s,border-color .15s,box-shadow .15s;
}
.answer-chip:active{cursor:grabbing;transform:scale(1.07)}
.answer-chip.used{opacity:.2;pointer-events:none;text-decoration:line-through;filter:grayscale(.8)}
.answer-chip:not(.used):hover{background:rgba(255,215,0,.11);border-color:var(--gold);transform:translateY(-2px);box-shadow:0 4px 13px rgba(255,215,0,.18)}
.answer-chip.selected{background:rgba(255,215,0,.17);border-color:var(--gold);box-shadow:0 0 0 3px rgba(255,215,0,.22);transform:translateY(-2px)}

/* ════════════════════════ KARTLAR ════════════════════════ */
.card{
  background:var(--card-bg);
  border:1.5px solid var(--border);border-left:4px solid var(--gold);
  border-radius:var(--rl);margin:1.8rem 0;
  padding:1.9rem 1.4rem 1.2rem;position:relative;
  box-shadow:0 6px 30px rgba(0,0,0,.32);
  transition:border-color .25s,border-left-color .25s,box-shadow .25s;
}
.card:has(.drop-zone.correct){border-color:rgba(27,138,60,.45);border-left-color:var(--green);box-shadow:0 6px 30px rgba(27,138,60,.18)}
.card-number{
  position:absolute;top:-14px;left:1.2rem;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:var(--navy);font-family:'Rajdhani',sans-serif;font-weight:700;
  font-size:.76rem;border-radius:50px;padding:3px 13px;
  letter-spacing:.7px;box-shadow:0 2px 8px rgba(255,215,0,.35);z-index:2;
}
.emoji-row{display:flex;align-items:center;gap:.52rem;flex-wrap:wrap;margin-bottom:1rem}
.emoji-box{font-size:2rem;background:var(--navy3);border:1px solid rgba(255,215,0,.13);border-radius:50px;padding:.28rem .65rem;user-select:none;box-shadow:0 2px 7px rgba(0,0,0,.22)}
.emoji-plus{font-size:1.25rem;color:var(--muted);font-weight:800}
.emoji-eq{font-size:1.2rem;color:var(--gold);font-weight:800}

/* DROP ZONE */
.drop-zone{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:155px;height:48px;
  border:2px dashed rgba(136,150,184,.45);border-radius:50px;
  padding:0 1rem;font-size:1rem;font-weight:700;
  color:var(--muted);background:rgba(21,32,64,.5);
  transition:border-color .2s,background .2s,box-shadow .2s;cursor:pointer;
}
.drop-zone.drag-over{border-color:var(--blue-lt);background:rgba(21,101,192,.13);box-shadow:0 0 14px rgba(33,150,243,.22)}
.drop-zone.filled{border-style:solid;border-color:rgba(255,215,0,.45);color:var(--white)}
.drop-zone.correct{border-style:solid;border-color:var(--green);background:rgba(27,138,60,.14);color:var(--green-lt);box-shadow:0 0 13px rgba(27,138,60,.22)}
.drop-zone.wrong{border-color:var(--red-lt);background:rgba(204,34,0,.13);color:var(--red-lt);animation:dzShake .35s}
.drop-zone.correct-flash{animation:correctFlash .55s ease}
.drop-zone:not(.correct):hover{border-color:rgba(255,215,0,.38);background:rgba(255,215,0,.05)}
@keyframes dzShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
@keyframes correctFlash{0%{box-shadow:0 0 0 0 rgba(46,204,113,.85)}70%{box-shadow:0 0 0 14px rgba(46,204,113,0)}100%{box-shadow:0 0 0 0 rgba(46,204,113,0)}}

/* Yanlış - ekran kırmızı titreme */
@keyframes screenShake{
  0%,100%{transform:translateX(0)}
  15%{transform:translateX(-8px)}
  30%{transform:translateX(8px)}
  45%{transform:translateX(-5px)}
  60%{transform:translateX(5px)}
  75%{transform:translateX(-3px)}
}
body.wrong-shake{animation:screenShake .45s ease}

/* Floating puan */
.float-pts{
  position:fixed;pointer-events:none;z-index:9998;
  font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1.55rem;
  color:var(--green-lt);text-shadow:0 0 10px rgba(46,204,113,.55);
  animation:floatUp 1.1s ease-out forwards;white-space:nowrap;
}
@keyframes floatUp{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-85px) scale(.8);opacity:0}}

/* BUTONLAR */
.card-actions{display:flex;gap:.45rem;flex-wrap:wrap;margin-top:.75rem;align-items:center}
.reveal-btn,.speak-btn,.speak-inline{border-radius:50px;font-family:'Nunito',sans-serif;font-weight:700;cursor:pointer;transition:border-color .2s,color .2s,background .2s,transform .1s}
.reveal-btn{background:transparent;border:1.5px solid rgba(136,150,184,.38);color:var(--muted);font-size:.78rem;padding:.28rem .88rem}
.reveal-btn:hover{border-color:var(--gold-dim);color:var(--gold);background:rgba(255,215,0,.06)}
.speak-btn{background:rgba(21,101,192,.14);border:1.5px solid rgba(21,101,192,.45);color:var(--blue-lt);font-size:.78rem;padding:.28rem .88rem;display:inline-flex;align-items:center;gap:.28rem}
.speak-btn:hover{background:rgba(21,101,192,.26);transform:scale(1.04)}
.speak-btn.speaking{animation:pulse .55s infinite alternate}
@keyframes pulse{from{opacity:1}to{opacity:.32}}

/* BİLGİ PANELİ */
.reveal-panel{
  display:none;
  background:linear-gradient(135deg,rgba(11,22,50,.96),rgba(9,18,44,.98));
  border-radius:var(--r);padding:.95rem 1.15rem;margin-top:.8rem;
  border-left:4px solid var(--blue);
  border-top:1px solid rgba(21,101,192,.18);
  border-right:1px solid rgba(21,101,192,.08);
  border-bottom:1px solid rgba(21,101,192,.08);
  font-size:.9rem;line-height:1.75;animation:fadeIn .3s ease;
}
.reveal-panel.show{display:block}
.panel-top{display:flex;align-items:center;gap:.55rem;flex-wrap:wrap;margin-bottom:.22rem}
.word-en{font-family:'Rajdhani',sans-serif;font-size:1.35rem;font-weight:700;color:var(--gold);letter-spacing:.4px}
.speak-inline{background:transparent;border:1.5px solid rgba(21,101,192,.45);border-radius:50px;color:var(--blue-lt);font-size:.7rem;padding:.1rem .55rem;cursor:pointer;display:inline-flex;align-items:center;gap:.22rem;transition:background .2s}
.speak-inline:hover{background:rgba(21,101,192,.18)}
.speak-inline.speaking{animation:pulse .55s infinite alternate}
.pronunciation{color:var(--blue-lt);font-style:italic;font-size:.84rem;margin-bottom:.22rem;opacity:.82}
.word-tr{color:var(--muted);margin-bottom:.38rem;font-size:.88rem}
.example{color:var(--white);font-size:.88rem}
.example em{color:var(--gold);font-style:normal;font-weight:800}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

/* ════════════════════════ BİTİŞ EKRANI ════════════════════════ */
#summary{
  display:none;
  position:fixed;inset:0;z-index:100;
  background:rgba(6,12,28,.92);
  backdrop-filter:blur(6px);
  overflow-y:auto;
  animation:fadeIn .4s ease;
}
.summary-box{
  max-width:580px;width:95%;
  background:linear-gradient(160deg,var(--navy2),var(--card-bg));
  border:1.5px solid var(--border);border-radius:var(--rl);
  padding:1.8rem 1.6rem 2rem;
  margin:2rem auto;
  box-shadow:0 20px 70px rgba(0,0,0,.5);
  animation:popIn .45s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn{from{transform:scale(.75);opacity:0}to{transform:scale(1);opacity:1}}

.sum-banner{
  display:flex;align-items:center;gap:.65rem;
  background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.25);
  border-radius:var(--r);padding:.62rem 1rem;margin-bottom:1.2rem;
}
.sum-logo{width:48px;height:48px;border-radius:50%;border:2px solid var(--gold);overflow:hidden;background:#fff;flex-shrink:0}
.sum-logo img{width:100%;height:100%;object-fit:cover;display:block}
.sum-school .s1{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:clamp(.72rem,1.8vw,.88rem);color:var(--gold);letter-spacing:.7px;text-transform:uppercase;line-height:1.2}
.sum-school .s2{font-size:.68rem;color:var(--muted);font-weight:600;letter-spacing:.4px}

.sum-trophy{font-size:3rem;display:block;text-align:center;margin-bottom:.2rem;filter:drop-shadow(0 0 18px rgba(255,215,0,.48));animation:trophyBounce .65s cubic-bezier(.34,1.56,.64,1)}
@keyframes trophyBounce{from{transform:scale(0) rotate(-18deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
#sumTitle{font-family:'Rajdhani',sans-serif;font-size:clamp(1.6rem,5vw,2.4rem);font-weight:700;color:var(--gold);text-align:center;letter-spacing:.8px;text-shadow:0 0 26px rgba(255,215,0,.36);margin-bottom:.28rem}
#sumTitle.lost{color:var(--red-lt);text-shadow:0 0 26px rgba(204,34,0,.4)}
.sum-sub{text-align:center;color:var(--muted);font-size:.95rem;margin-bottom:1.1rem}

/* stat kutular */
.sum-stats{display:flex;gap:.6rem;flex-wrap:wrap;justify-content:center;margin-bottom:1.1rem}
.sbox{background:var(--card-bg);border:1.5px solid var(--border);border-radius:var(--r);padding:.65rem 1.1rem;min-width:82px;text-align:center}
.sbox .sv{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1.8rem;color:var(--gold);line-height:1}
.sbox .sl{font-size:.6rem;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--muted);margin-top:2px}
.sbox.record{border-color:rgba(255,215,0,.55);background:rgba(255,215,0,.07);animation:recPulse 1.4s ease infinite}
@keyframes recPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,215,0,.38)}50%{box-shadow:0 0 0 8px rgba(255,215,0,0)}}
.sbox.lost-box .sv{color:var(--red-lt)}

/* HATA RAPORU */
.error-section{
  background:rgba(204,34,0,.07);border:1.5px solid rgba(204,34,0,.28);
  border-left:4px solid var(--red);border-radius:var(--r);
  padding:.85rem 1.1rem;margin-bottom:1.1rem;
}
.error-title{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.92rem;color:var(--red-lt);letter-spacing:.7px;text-transform:uppercase;margin-bottom:.6rem;display:flex;align-items:center;gap:.38rem}
.err-list{list-style:none}
.err-item{display:flex;align-items:flex-start;gap:.5rem;padding:.3rem 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:.84rem;line-height:1.4}
.err-item:last-child{border-bottom:none}
.err-emojis{font-size:1rem;flex-shrink:0;padding-top:.05rem}
.err-detail{flex:1}
.err-guess{color:var(--red-lt);font-weight:700}
.err-correct{color:var(--green-lt);font-weight:700}
.no-err{color:var(--green-lt);font-weight:700;font-size:.9rem;padding:.2rem 0}

#restart-btn{
  display:block;width:100%;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:var(--navy);font-family:'Rajdhani',sans-serif;font-weight:700;
  font-size:1.08rem;letter-spacing:.9px;border:none;border-radius:50px;
  padding:.78rem 2rem;cursor:pointer;
  box-shadow:0 4px 18px rgba(255,215,0,.32);text-transform:uppercase;
  transition:transform .15s,box-shadow .15s;
}
#restart-btn:hover{transform:scale(1.04) translateY(-2px);box-shadow:0 7px 26px rgba(255,215,0,.48)}

/* KONFETİ */
.cpiece{position:fixed;width:8px;height:8px;border-radius:2px;pointer-events:none;z-index:9999;animation:cfall var(--d) ease-in forwards}
@keyframes cfall{0%{transform:translateY(-20px) rotate(0);opacity:1}80%{opacity:1}100%{transform:translateY(var(--f)) rotate(var(--r));opacity:0}}

footer{position:relative;z-index:1;text-align:center;color:rgba(136,150,184,.38);font-size:.73rem;padding:1.4rem 1rem 1.8rem;border-top:1px solid rgba(255,215,0,.05);letter-spacing:.45px}
footer strong{color:rgba(255,215,0,.38)}

@media(max-width:520px){
  .hdr-atom,.game-sub{display:none}
  .logo-ring{width:60px;height:60px}
  .game-title{font-size:1.45rem}
  .emoji-box{font-size:1.65rem;padding:.24rem .5rem}
  .card{padding:1.35rem .95rem 1rem}
  .drop-zone{min-width:115px;font-size:.9rem}
  .hud-inner{gap:.35rem}
}
</style>
</head>
<body>

<!-- Atom filigran SVG -->
<svg id="atom-bg" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <ellipse cx="150" cy="150" rx="130" ry="44" stroke="#FFD700" stroke-width="1.5"/>
  <ellipse cx="150" cy="150" rx="130" ry="44" stroke="#CC2200" stroke-width="1.5" transform="rotate(60 150 150)"/>
  <ellipse cx="150" cy="150" rx="130" ry="44" stroke="#1565C0" stroke-width="1.5" transform="rotate(120 150 150)"/>
  <circle cx="150" cy="150" r="10" fill="#FFD700"/>
  <circle cx="150" cy="150" r="4" fill="#0D1B3E"/>

let currentBtn=null;
function getBestEnglishVoice(){
  const v=window.speechSynthesis.getVoices();
  const ok=x=>x.lang.toLowerCase().startsWith('en')&&!x.name.toLowerCase().includes('türkçe')&&!x.name.toLowerCase().includes('turkish');
  return v.find(x=>x.lang==='en-US'&&ok(x))||v.find(x=>x.lang==='en-GB'&&ok(x))||v.find(ok)||null;
}
function speak(text,btn){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  if(currentBtn){currentBtn.classList.remove('speaking');currentBtn=null;}
  const go=()=>{
    const u=new SpeechSynthesisUtterance(text);
    u.lang='en-US';u.rate=0.82;u.pitch=1;
    const v=getBestEnglishVoice();if(v){u.voice=v;u.lang=v.lang;}
    if(btn){currentBtn=btn;btn.classList.add('speaking');u.onend=u.onerror=()=>{btn.classList.remove('speaking');currentBtn=null;}}
    window.speechSynthesis.speak(u);
  };
  window.speechSynthesis.getVoices().length>0?go():(window.speechSynthesis.onvoiceschanged=()=>{window.speechSynthesis.onvoiceschanged=null;go();});
}

// ══════════════════════════════════════════════════════
// ZAMANLAYICI
// ══════════════════════════════════════════════════════
function renderTimer(){
  const m=Math.floor(timeLeft/60),s=timeLeft%60;
  document.getElementById('timerVal').textContent=m+':'+(s<10?'0':'')+s;
  document.getElementById('timerEl').classList.toggle('critical',timeLeft<=10);
}
function startTimer(){
  clearInterval(timerID);
  timerID=setInterval(()=>{
    if(gameOver)return;
    timeLeft--;
    renderTimer();
    if(timeLeft<=10 && timeLeft>0) sfxTick();
    if(timeLeft<=0){clearInterval(timerID);endGame(false,'timeout');}
  },1000);
}

// ══════════════════════════════════════════════════════
// SES SİSTEMİ — Web Audio API (dosya gerekmez)
// ══════════════════════════════════════════════════════
let _ac = null;
function ac() {
  if (!_ac) _ac = new (window.AudioContext || window.webkitAudioContext)();
  // iOS/Safari suspend'den çıkar
  if (_ac.state === 'suspended') _ac.resume();
  return _ac;
}

// Temel ses oluşturucu
function tone(freq, type, vol, startT, durT, ctx) {
  const osc  = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type = type;
  osc.frequency.setValueAtTime(freq, startT);
  gain.gain.setValueAtTime(0, startT);
  gain.gain.linearRampToValueAtTime(vol, startT + 0.008);
  gain.gain.exponentialRampToValueAtTime(0.0001, startT + durT);
  osc.start(startT);
  osc.stop(startT + durT + 0.01);
}

// ✅ Doğru cevap — neşeli arp (üç nota yukarı)
function sfxCorrect() {
  try {
    const ctx = ac(), t = ctx.currentTime;
    const notes = [523.25, 659.25, 783.99]; // C5 E5 G5
    notes.forEach((f, i) => tone(f, 'sine', 0.18, t + i * 0.09, 0.22, ctx));
    // parlak tını katmanı
    tone(1046.5, 'triangle', 0.06, t + 0.18, 0.18, ctx);
  } catch(e) {}
}

// ❌ Yanlış cevap — kısa, düşük uyarı
function sfxWrong() {
  try {
    const ctx = ac(), t = ctx.currentTime;
    tone(220, 'sawtooth', 0.14, t,       0.12, ctx);
    tone(180, 'sawtooth', 0.10, t + 0.1, 0.14, ctx);
    // gürültü darbesi
    const buf  = ctx.createBuffer(1, ctx.sampleRate * 0.12, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random()*2-1) * 0.06;
    const src  = ctx.createBufferSource();
    const gn   = ctx.createGain();
    src.buffer = buf; src.connect(gn); gn.connect(ctx.destination);
    gn.gain.setValueAtTime(0.9, t); gn.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
    src.start(t);
  } catch(e) {}
}

// ⏱️ Kritik süre — tek kısa bip (her saniye çağrılır)
function sfxTick() {
  try {
    const ctx = ac(), t = ctx.currentTime;
    tone(880, 'square', 0.09, t, 0.07, ctx);
  } catch(e) {}
}

// 🏆 Kazandın — yükselen fanfar
function sfxWin() {
  try {
    const ctx = ac(), t = ctx.currentTime;
    const seq = [
      [523.25, 0.00, 0.14],
      [659.25, 0.13, 0.14],
      [783.99, 0.26, 0.14],
      [1046.5, 0.39, 0.35],
      [1318.5, 0.62, 0.45],
    ];
    seq.forEach(([f, dt, dur]) => {
      tone(f, 'sine',     0.18, t + dt, dur, ctx);
      tone(f, 'triangle', 0.07, t + dt, dur, ctx);
    });
  } catch(e) {}
}

// ⏳ Kaybettin — inen üzgün akord
function sfxLose() {
  try {
    const ctx = ac(), t = ctx.currentTime;
    const seq = [
      [392.00, 0.00, 0.22],
      [349.23, 0.20, 0.22],
      [311.13, 0.40, 0.22],
      [261.63, 0.62, 0.45],
    ];
    seq.forEach(([f, dt, dur]) => tone(f, 'sine', 0.15, t + dt, dur, ctx));
  } catch(e) {}
}

// AudioContext'i kullanıcı etkileşimiyle başlat (otoplay politikası)
function unlockAudio() {
  try { ac(); } catch(e) {}
  document.removeEventListener('pointerdown', unlockAudio);
  document.removeEventListener('keydown',     unlockAudio);
}
document.addEventListener('pointerdown', unlockAudio, { once: true });
document.addEventListener('keydown',     unlockAudio, { once: true });

// KONFETİ
// ══════════════════════════════════════════════════════
const CCOLORS=['#FFD700','#FFC107','#CC2200','#ff4422','#1565C0','#2196F3','#1B8A3C','#2ecc71'];
function confetti(n){
  for(let i=0;i<n;i++){
    const el=document.createElement('div');
    el.className='cpiece';
    const c=CCOLORS[~~(Math.random()*CCOLORS.length)];
    const l=10+Math.random()*80, d=1.4+Math.random()*1.1;
    const f=(300+Math.random()*400)+'px', r=(-180+Math.random()*360)+'deg';
    el.style.cssText=`background:${c};left:${l}vw;top:28vh;border-radius:${Math.random()>.5?'50%':'2px'};--d:${d}s;--f:${f};--r:${r}`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),d*1000+200);
  }
}

// Floating puan
function floatPts(pts,anchorEl){
  const el=document.createElement('div');
  el.className='float-pts';
  el.textContent='+'+pts+' puan';
  if(anchorEl){
    const rc=anchorEl.getBoundingClientRect();
    el.style.left=(rc.left+rc.width/2-45)+'px';
    el.style.top=(rc.top-10)+'px';
  } else {el.style.left='50vw';el.style.top='40vh';}
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1200);
}

// ══════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════
function init(){
  puzzles=shuffle(ALL_PUZZLES);
  bankOrder=shuffle([...Array(puzzles.length).keys()]);
  answered={};score=0;totalPts=0;selectedChip=null;
  wrongAttempts=[];timeLeft=CFG.totalSecs;gameOver=false;
  document.getElementById('summary').style.display='none';
  document.getElementById('game').style.display='';
  document.getElementById('ptsEl').textContent='0';
  renderTimer();
  render();
  startTimer();
}

// ══════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════
function render(){
  updateScore();
  const game=document.getElementById('game');
  game.innerHTML='';

  // Kelime bankası
  const bw=document.createElement('div');bw.className='bank-wrap';
  const bl=document.createElement('div');bl.className='bank-label';bl.textContent='🗂️ Kelime Havuzu — sürükle veya seç → bırak';
  bw.appendChild(bl);
  const bank=document.createElement('div');bank.className='answer-bank';bank.id='answer-bank';
  bankOrder.forEach(pi=>{
    const p=puzzles[pi];
    const chip=document.createElement('div');
    chip.className='answer-chip'+(answered[pi]?' used':'');
    chip.textContent=p.answer;chip.draggable=!answered[pi];
    chip.dataset.answer=p.answer;chip.dataset.idx=pi;
    chip.addEventListener('dragstart',e=>{deselectChip();e.dataTransfer.setData('text/plain',p.answer+'|||'+pi);});
    chip.addEventListener('click',()=>{
      if(answered[pi])return;
      if(selectedChip===chip){deselectChip();return;}
      deselectChip();selectedChip=chip;chip.classList.add('selected');
    });
    bank.appendChild(chip);
  });
  bw.appendChild(bank);game.appendChild(bw);

  // Puzzle kartları
  puzzles.forEach((p,i)=>{
    const card=document.createElement('div');card.className='card';card.id='card-'+i;
    const num=document.createElement('div');num.className='card-number';num.textContent='#'+(i+1);card.appendChild(num);

    const row=document.createElement('div');row.className='emoji-row';
    p.emojis.forEach((em,j)=>{
      if(j>0){const pl=document.createElement('span');pl.className='emoji-plus';pl.textContent='+';row.appendChild(pl);}
      const bx=document.createElement('span');bx.className='emoji-box';bx.textContent=em;row.appendChild(bx);
    });
    const eq=document.createElement('span');eq.className='emoji-eq';eq.textContent='=';row.appendChild(eq);

    const dz=document.createElement('div');
    dz.className='drop-zone'+(answered[i]?' correct filled':'');
    dz.id='dz-'+i;dz.textContent=answered[i]?p.answer:'❓ buraya bırak';
    dz.dataset.puzzleIdx=i;
    dz.addEventListener('dragover',e=>{e.preventDefault();if(!answered[i])dz.classList.add('drag-over');});
    dz.addEventListener('dragleave',()=>dz.classList.remove('drag-over'));
    dz.addEventListener('drop',e=>{
      e.preventDefault();dz.classList.remove('drag-over');
      if(answered[i])return;
      const pts=e.dataTransfer.getData('text/plain').split('|||');
      checkAnswer(i,pts[0],parseInt(pts[1]),dz);
    });
    dz.addEventListener('click',()=>{
      if(answered[i])return;
      if(selectedChip){const a=selectedChip.dataset.answer,s=parseInt(selectedChip.dataset.idx);deselectChip();checkAnswer(i,a,s,dz);}
    });
    row.appendChild(dz);card.appendChild(row);

    const ac=document.createElement('div');ac.className='card-actions';ac.id='actions-'+i;
    if(!answered[i]){
      const rb=document.createElement('button');rb.className='reveal-btn';rb.textContent='📖 İpucu / Cevabı Gör';rb.onclick=()=>toggleReveal(i);ac.appendChild(rb);
    } else { ac.appendChild(makeSpeakBtn(p.answer)); }
    card.appendChild(ac);

    const pan=document.createElement('div');pan.className='reveal-panel'+(answered[i]?' show':'');pan.id='panel-'+i;
    pan.appendChild(makePanelContent(p,!answered[i]));
    card.appendChild(pan);
    game.appendChild(card);
  });
}

// ══════════════════════════════════════════════════════
// PANEL İÇERİĞİ (değiştirilmedi)
// ══════════════════════════════════════════════════════
function makePanelContent(p,showSpeak){
  const frag=document.createDocumentFragment();
  const top=document.createElement('div');top.className='panel-top';
  const we=document.createElement('span');we.className='word-en';we.textContent=p.answer;top.appendChild(we);
  if(showSpeak){const si=document.createElement('button');si.className='speak-inline';si.innerHTML='🔊 Dinle';si.onclick=()=>speak(p.answer,si);top.appendChild(si);}
  frag.appendChild(top);
  const pr=document.createElement('div');pr.className='pronunciation';pr.textContent=p.pron;frag.appendChild(pr);
  const tr=document.createElement('div');tr.className='word-tr';tr.innerHTML='🇹🇷 <strong>'+p.tr+'</strong>';frag.appendChild(tr);
  const ex=document.createElement('div');ex.className='example';ex.innerHTML='💬 '+p.ex;frag.appendChild(ex);
  return frag;
}
function makeSpeakBtn(ans){
  const sb=document.createElement('button');sb.className='speak-btn';sb.innerHTML='🔊 Dinle';sb.onclick=()=>speak(ans,sb);return sb;
}

// ══════════════════════════════════════════════════════
// YARDIMCILAR
// ══════════════════════════════════════════════════════
function deselectChip(){if(selectedChip){selectedChip.classList.remove('selected');selectedChip=null;}}
function toggleReveal(i){const p=document.getElementById('panel-'+i);if(p)p.classList.toggle('show');}

// ══════════════════════════════════════════════════════
// CEVAP KONTROLÜ
// ══════════════════════════════════════════════════════
function checkAnswer(idx,dropped,chipIdx,dz){
  if(gameOver)return;
  const p=puzzles[idx];
  if(answered[idx])return;

  if(dropped.toLowerCase()===p.answer.toLowerCase()){
    // ✅ DOĞRU
    answered[idx]=true; score++;
    const pts=CFG.ptsCorrect+Math.floor(timeLeft*CFG.ptsSec);
    totalPts+=pts;

    dz.className='drop-zone correct filled correct-flash';
    dz.textContent=p.answer;
    setTimeout(()=>dz.classList.remove('correct-flash'),600);

    confetti(12);
    floatPts(pts,dz);
    sfxCorrect();

    const pan=document.getElementById('panel-'+idx);
    if(pan){pan.innerHTML='';pan.appendChild(makePanelContent(p,false));pan.classList.add('show');}
    const ac=document.getElementById('actions-'+idx);
    if(ac){ac.innerHTML='';ac.appendChild(makeSpeakBtn(p.answer));}
    const chip=document.querySelector('.answer-chip[data-idx="'+chipIdx+'"]');
    if(chip){chip.classList.add('used');chip.draggable=false;}

    updateScore();

    if(totalPts>=CFG.targetPts){clearInterval(timerID);setTimeout(()=>endGame(true,'target'),600);}
    else if(score===puzzles.length){clearInterval(timerID);setTimeout(()=>endGame(true,'all'),800);}

  } else {
    // ❌ YANLIŞ — kaydet + ekran titret
    wrongAttempts.push({puzzle:p, guessed:dropped});
    dz.classList.add('wrong');
    setTimeout(()=>{dz.className='drop-zone';},600);
    document.body.classList.remove('wrong-shake');
    void document.body.offsetWidth; // reflow
    document.body.classList.add('wrong-shake');
    setTimeout(()=>document.body.classList.remove('wrong-shake'),480);
    sfxWrong();
  }
}

// ══════════════════════════════════════════════════════
// SKOR GÜNCELLE
// ══════════════════════════════════════════════════════
function updateScore(){
  const pct=(score/puzzles.length*100).toFixed(0);
  document.getElementById('progress').style.width=pct+'%';
  document.getElementById('scoreLabel').textContent=score+' / '+puzzles.length+' doğru';
  document.getElementById('ptsEl').textContent=totalPts.toLocaleString('tr-TR');
}

// ══════════════════════════════════════════════════════
// OYUN BİTİŞİ
// ══════════════════════════════════════════════════════
function endGame(won,reason){
  if(gameOver)return;
  gameOver=true;
  clearInterval(timerID);
  document.getElementById('game').style.display='none';

  const newRec=trySetHS(totalPts);
  const hs=getHS();

  // Başlık
  const trophy=document.getElementById('sumTrophy');
  const title=document.getElementById('sumTitle');
  const sub=document.getElementById('sumSub');
  if(won){
    trophy.textContent=reason==='target'?'🏆':'🎉';
    title.textContent=reason==='target'?'Hedef Puana Ulaştın!':'Tebrikler, Kazandın!';
    title.classList.remove('lost');
    sub.textContent='Harika bir performans! 🌟';
    confetti(65);
    sfxWin();
  } else {
    trophy.textContent='⏳';
    title.textContent='Süre Doldu!';
    title.classList.add('lost');
    sub.textContent='Maalesef Başarısız Oldun. Bir dahaki sefere! 💪';
    sfxLose();
  }

  // Stat kutuları
  const pct=Math.round(score/puzzles.length*100);
  document.getElementById('sumStats').innerHTML=
    "<div class='sbox'><div class='sv'>"+score+"</div><div class='sl'>✅ Doğru</div></div>"+
    "<div class='sbox "+(won?'':'lost-box')+"'><div class='sv'>"+wrongAttempts.length+"</div><div class='sl'>❌ Hata</div></div>"+
    "<div class='sbox'><div class='sv'>"+pct+"%</div><div class='sl'>🎯 Başarı</div></div>"+
    "<div class='sbox'><div class='sv'>"+totalPts.toLocaleString('tr-TR')+"</div><div class='sl'>⭐ Puan</div></div>"+
    "<div class='sbox "+(newRec?'record':'')+"'><div class='sv'>"+hs.toLocaleString('tr-TR')+"</div><div class='sl'>🏅 "+(newRec?'Yeni Rekor!':'En Yüksek')+"</div></div>";

  // Hata raporu
  const list=document.getElementById('errList');
  list.innerHTML='';
  if(wrongAttempts.length===0){
    list.innerHTML="<li class='err-item'><span class='no-err'>🎊 Hiç hata yapmadın — mükemmel!</span></li>";
  } else {
    // Grupla (aynı soruya birden fazla hata varsa tek satır)
    const map={};
    wrongAttempts.forEach(w=>{
      const k=w.puzzle.answer;
      if(!map[k])map[k]={puzzle:w.puzzle,guesses:[]};
      if(!map[k].guesses.includes(w.guessed))map[k].guesses.push(w.guessed);
    });
    Object.values(map).forEach(({puzzle:p,guesses})=>{
      const li=document.createElement('li');li.className='err-item';
      li.innerHTML=
        "<span class='err-emojis'>"+p.emojis.join(' + ')+"</span>"+
        "<span class='err-detail'>"+
          "<span class='err-guess'>"+guesses.join(', ')+"</span>"+
          " → doğrusu: <span class='err-correct'>"+p.answer+"</span>"+
        "</span>";
      list.appendChild(li);
    });
  }

  document.getElementById('summary').style.display='block';
}

// ──── showSummary (eski uyumluluk) ────
function showSummary(){ endGame(true,'all'); }

if(window.speechSynthesis){
  window.speechSynthesis.getVoices();
  window.speechSynthesis.onvoiceschanged=()=>window.speechSynthesis.getVoices();
}
init();
</script>
